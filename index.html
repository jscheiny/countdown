<!doctype html>
<html>

<head>
    <title>Final countdown</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="countdown.css">
    <script src="countdown.js"></script>
</head>

<body>
    <div class="spacer"></div>
    <table class="countdown">
        <tbody>
            <tr class="row">
                <td class="value years" id="years"></td>
                <td class="label years">years</td>
            </tr>
            <tr class="row">
                <td class="value days" id="days"></td>
                <td class="label days">days</td>
            </tr>
            <tr class="row">
                <td class="value hours" id="hours"></td>
                <td class="label hours">hours</td>
            </tr>
            <tr class="row">
                <td class="value minutes" id="minutes"></td>
                <td class="label minutes">minutes</td>
            </tr>
            <tr class="row">
                <td class="value seconds" id="seconds"></td>
                <td class="label seconds">seconds</td>
            </tr>
        </tbody>
    </table>
    <div class="spacer"></div>
    <div class="selector">
        <a href="#c1" id="c1">S</a>
        <a href="#c2" id="c2">G</a>
        <a href="#c3" id="c3">Z</a>
    </div>
</body>

</html>
